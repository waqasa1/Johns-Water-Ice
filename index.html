  <style>
    /* Critical CSS for LCP */
    :root {
      --green-primary: #0b7a35;
      --white: #ffffff;
      --text-dark: #1a1a2e;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      background: var(--white);
    }

    .site-header {
      position: sticky;
      top: 0;
      background: var(--white);
      z-index: 1000;
      min-height: 86px;
      border-bottom: 1px solid transparent;
    }

    .hero-section {
      padding: 60px 0;
      min-height: 80vh;
      display: flex;
      align-items: center;
      background-color: #e8f6ef;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
      box-sizing: border-box;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      margin: 0 0 24px;
      color: var(--text-dark);
      line-height: 1.15;
    }

    .hero-img {
      width: 100%;
      max-width: 500px;
      height: auto;
      aspect-ratio: 1/1;
      border-radius: 12px;
    }

    #root {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1;
    }
  </style>

  <link rel="icon" type="image/webp" href="/favicon.webp" />
